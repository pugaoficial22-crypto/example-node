sonar.projectKey=pugaoficial22-crypto_example-node
sonar.projectName=Fast API Dev
sonar.projectVersion=1.0

# Como el pipeline ya entra a 'fast-api-dev', las fuentes son el directorio actual
sonar.sources=.
sonar.tests=tests

# EXCLUSIONES: Esto eliminará los 233 errores de golpe
sonar.exclusions=node_modules/**, coverage/**, public/**, bin/**, **/*.html, ../load_test.js

# COBERTURA: Ruta relativa desde la carpeta fast-api-dev
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8