sonar.projectKey=pugaoficial22-crypto_example-node
sonar.projectName=Fast API Dev
sonar.projectVersion=1.0

# Como el pipeline ya está parado dentro de 'fast-api-dev', usamos el punto
sonar.sources=.
sonar.tests=tests

# EXCLUSIONES: Esto es lo que borrará los 233 errores de golpe
sonar.exclusions=node_modules/**, coverage/**, public/**, bin/**, **/*.html, ../load_test.js

# COBERTURA: Ahora Sonar encontrará el archivo lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8