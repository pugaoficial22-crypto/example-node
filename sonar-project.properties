sonar.projectKey=pugaoficial22-crypto_example-node
sonar.projectName=Fast API Dev
sonar.projectVersion=1.0

# Como el pipeline ya entra a la carpeta, el código está en el directorio actual
sonar.sources=.
sonar.tests=tests

# Esto eliminará los 223 errores y bajará la duplicación de golpe
sonar.exclusions=node_modules/**, coverage/**, public/**, bin/**, **/*.html, ../load_test.js

# Esta es la ruta exacta donde GitHub guarda los resultados de los tests
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8