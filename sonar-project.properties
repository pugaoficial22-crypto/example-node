sonar.projectKey=pugaoficial22-crypto_example-node
sonar.projectName=Fast API Dev
sonar.projectVersion=1.0

# Como el pipeline ya te metió en la carpeta, usa el punto para "aquí mismo"
sonar.sources=.
sonar.tests=tests

# Exclusiones simplificadas (ya estamos dentro de la carpeta)
sonar.exclusions=node_modules/**, coverage/**, **/*.html, ../load_test.js

# La ruta del reporte también se simplifica
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8