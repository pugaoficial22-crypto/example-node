name: CI/CD Pipeline - Fast API Dev

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ══════════════════════════════════════════
  # ETAPA 1 — Análisis de calidad (SonarCloud)
  # ══════════════════════════════════════════
  sonarqube:
    name: 🔍 SonarCloud Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fast-api-dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fast-api-dev/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests with coverage
        run: npm test -- --coverage --coverageReporters=lcov

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: fast-api-dev
          args: >
            -Dsonar.organization=pugaoficial22-crypto
            -Dsonar.projectKey=pugaoficial22-crypto_example-node
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ══════════════════════════════════════════
  # ETAPA 2 — Prueba de rendimiento (K6)
  # ══════════════════════════════════════════
  k6-load-test:
    name: ⚡ K6 Performance Test
    runs-on: ubuntu-latest
    needs: sonarqube
    defaults:
      run:
        working-directory: fast-api-dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fast-api-dev/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Start application
        run: |
          npm start &
          echo "Esperando que la app inicie..."
          for i in {1..15}; do
            curl -sf http://localhost:3000/health && break
            echo "Intento $i/15..."
            sleep 2
          done

      - name: Install K6
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gnupg2
          curl -s https://dl.k6.io/key.gpg | sudo apt-key add -
          echo "deb https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq
          sudo apt-get install -y k6
        working-directory: /home/runner

      - name: Run K6 Load Test
        run: k6 run --env BASE_URL=http://localhost:3000 ../load_test.js

  # ══════════════════════════════════════════
  # ETAPA 3 — Build y Push a GHCR (Docker)
  # ══════════════════════════════════════════
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: k6-load-test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: fast-api-dev
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ══════════════════════════════════════════
  # ETAPA 4 — Deploy al servidor (SSH)
  # ══════════════════════════════════════════
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH with Proxy Jump
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 10.0.1.2
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.SERVER_HOST }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            docker stop fast-api-dev || true
            docker rm   fast-api-dev || true

            docker run -d \
              --name fast-api-dev \
              -p 8080:3000 \
              --restart always \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            sleep 4
            docker ps | grep fast-api-dev
            curl -sf http://localhost:8080/health && echo "✅ Deploy exitoso" \
              || (echo "❌ Health check falló" && exit 1)