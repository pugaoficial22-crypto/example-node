name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.20.0, 18.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: fast-api-dev/package-lock.json

      - name: Install dependencies
        working-directory: fast-api-dev
        run: npm ci --legacy-peer-deps

      - name: Run Jest tests
        working-directory: fast-api-dev
        run: npm test
