name: CI/CD Pipeline - Fast API Dev

on:
  push:
    branches: ["main"]

jobs:
  sonarqube:
    name: 🔍 SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & Test
        run: |
          cd fast-api-dev
          npm ci --legacy-peer-deps
          npm test -- --coverage --coverageReporters=lcov
      - name: SonarScanner
        uses: SonarSource/sonarqube-scan-action@v2
        with:
          args: >
            -Dsonar.organization=pugaoficial22-crypto
            -Dsonar.projectKey=pugaoficial22-crypto_example-node
            -Dsonar.sources=fast-api-dev/src
            -Dsonar.tests=fast-api-dev/tests
            -Dsonar.javascript.lcov.reportPaths=fast-api-dev/coverage/lcov.info
            -Dsonar.qualitygate.wait=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  k6-test:
    name: ⚡ K6 Performance Test
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - uses: actions/checkout@v4
      - name: Run App & K6
        run: |
          cd fast-api-dev
          npm ci --legacy-peer-deps
          PORT=3000 npm start > app.log 2>&1 &
          sleep 10
          curl -L https://github.com/grafana/k6/releases/download/v0.49.0/k6-v0.49.0-linux-amd64.tar.gz | tar -xz
          sudo mv k6-v0.49.0-linux-amd64/k6 /usr/local/bin/
          k6 run --env BASE_URL=http://localhost:3000 load_test.js || k6 run --env BASE_URL=http://localhost:3000 ../load_test.js

  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: k6-test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: fast-api-dev
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s             # Aumentamos a 1 minuto de espera
          command_timeout: 15m
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository }}:latest
            docker stop fast-api-dev || true
            docker rm fast-api-dev || true
            docker run -d --name fast-api-dev -p 8080:3000 --restart always ghcr.io/${{ github.repository }}:latest