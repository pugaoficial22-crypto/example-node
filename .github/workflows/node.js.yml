name: CI/CD Pipeline - Fast API Dev

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ETAPA 1: SONARCLOUD (Calidad)
  sonarqube:
    name: 🔍 SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: fast-api-dev

      - name: Run tests with coverage
        run: npm test -- --coverage --coverageReporters=lcov
        working-directory: fast-api-dev

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          args: >
            -Dsonar.organization=pugaoficial22-crypto
            -Dsonar.projectKey=pugaoficial22-crypto_example-node
            -Dsonar.sources=fast-api-dev/src
            -Dsonar.tests=fast-api-dev/tests
            -Dsonar.javascript.lcov.reportPaths=fast-api-dev/coverage/lcov.info
            -Dsonar.exclusions=**/node_modules/**,**/public/**,load_test.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ETAPA 2: K6 (Rendimiento)
  k6-load-test:
    name: ⚡ K6 Performance Test
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: fast-api-dev

      - name: Start application
        run: |
          npm start &
          echo "Esperando app en puerto 3000..."
          for i in {1..20}; do
            curl -sf http://localhost:3000/health && (echo "✅ App lista" && break)
            echo "Intento $i/20..."
            sleep 3
          done
        working-directory: fast-api-dev

      - name: Install K6
        run: |
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run K6 Load Test
        run: k6 run --env BASE_URL=http://localhost:3000 load_test.js

  # ETAPA 3: DOCKER (Empaquetado)
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: k6-load-test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: fast-api-dev
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # ETAPA 4: DEPLOY (Servidor Real)
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 10.0.1.2
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.SERVER_HOST }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker stop fast-api-dev || true
            docker rm fast-api-dev || true
            docker run -d --name fast-api-dev -p 8080:3000 --restart always ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            sleep 5
            curl -sf http://localhost:8080/health && echo "✅ DEPLOY EXITOSO" || (echo "❌ FALLÓ" && exit 1)