name: CI/CD Pipeline - Fast API Dev

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ETAPA 1: SONARCLOUD
  sonarqube:
    name: 🔍 SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: fast-api-dev

      - name: Run tests with coverage
        run: npm test -- --coverage --coverageReporters=lcov
        working-directory: fast-api-dev

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          args: >
            -Dsonar.organization=pugaoficial22-crypto
            -Dsonar.projectKey=pugaoficial22-crypto_example-node
            -Dsonar.sources=fast-api-dev/src
            -Dsonar.tests=fast-api-dev/tests
            -Dsonar.javascript.lcov.reportPaths=fast-api-dev/coverage/lcov.info
            -Dsonar.exclusions=**/node_modules/**,**/public/**,load_test.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ETAPA 2: K6 (CON ARRANQUE DIRECTO PARA EVITAR MODULE_NOT_FOUND)
  k6-load-test:
    name: ⚡ K6 Performance Test
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: fast-api-dev

      - name: Start application
        run: |
          cd fast-api-dev
          # Iniciamos directamente con node app.js para saltar el error de bin/www
          node app.js & 
          
          echo "Esperando app en puerto 3000..."
          for i in {1..20}; do
            if curl -sf http://localhost:3000/health; then
              echo "✅ App lista y respondiendo"
              break
            fi
            echo "Intento $i/20: La app está cargando módulos..."
            sleep 3
            if [ $i -eq 20 ]; then
              echo "❌ ERROR: La app no inició. Asegúrate que el archivo se llame app.js"
              exit 1
            fi
          done

      - name: Install K6
        run: |
          curl -L https://github.com/grafana/k6/releases/download/v0.49.0/k6-v0.49.0-linux-amd64.tar.gz | tar -xz
          sudo mv k6-v0.49.0-linux-amd64/k6 /usr/local/bin/

      - name: Run K6 Load Test
        run: k6 run --env BASE_URL=http://localhost:3000 load_test.js

  # ETAPA 3: DOCKER
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: k6-load-test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: fast-api-dev
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # ETAPA 4: DEPLOY
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 10.0.1.2
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.SERVER_HOST }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker stop fast-api-dev || true
            docker rm fast-api-dev || true
            docker run -d --name fast-api-dev -p 8080:3000 --restart always ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            sleep 10
            curl -sf http://localhost:8080/health && echo "✅ DEPLOY EXITOSO" || (echo "❌ FALLÓ" && exit 1)