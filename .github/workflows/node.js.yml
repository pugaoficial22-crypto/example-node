name: CI/CD Pipeline - Fast API Dev

# Se dispara cada vez que haces push a main
# o sea, cada que subo cambios al repo
on:
  push:
    branches: ["main"]

jobs:
  # ══════════════════════════════════════════
  # JOB 1: Analisis de codigo con SonarCloud
  # Este job corre primero que todo
  # Si falla aqui, los demas jobs no corren
  # ══════════════════════════════════════════
  sonarqube:
    name: "SonarCloud Analysis"
    # Estoy usando una maquina virtual Ubuntu de GitHub
    runs-on: ubuntu-latest
    steps:
      # Aqui bajo el codigo del repo a la maquina virtual
      # fetch-depth: 0 baja TODO el historial de commits
      # SonarCloud lo necesita para analizar bien el codigo
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Instalo Node.js version 20 en la maquina virtual
      # Mi app necesita Node para correr
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Instalo las dependencias del proyecto
      # npm ci usa el package-lock.json para instalar exactamente las versiones que se usaron
      # --legacy-peer-deps evita errores de compatibilidad
      - name: "Instalar dependencias"
        run: |
          cd fast-api-dev
          npm ci --legacy-peer-deps

      # Corro los tests de Jest y Supertest
      # --coverage genera el reporte de cobertura
      # --coverageReporters=lcov lo guarda en formato lcov
      # --coverageReporters=text muestra la tabla en consola
      # --verbose muestra cada test con check o cruz segun pase o falle
      - name: "Correr tests Jest + Supertest"
        run: |
          cd fast-api-dev
          echo "================================"
          echo "CORRIENDO TESTS"
          echo "================================"
          npm test -- \
            --coverage \
            --coverageReporters=lcov \
            --coverageReporters=text \
            --verbose
          echo "================================"
          echo "TESTS TERMINADOS"
          echo "================================"

      # Mandamos el codigo a SonarCloud para analisis
      # sonar.qualitygate.wait=true detiene el pipeline
      # si el codigo no pasa los estandares de calidad
      - name: "SonarScanner"
        uses: SonarSource/sonarqube-scan-action@v2
        with:
          args: >
            -Dsonar.organization=pugaoficial22-crypto
            -Dsonar.projectKey=pugaoficial22-crypto_example-node
            -Dsonar.sources=fast-api-dev/src
            -Dsonar.tests=fast-api-dev/tests
            -Dsonar.javascript.lcov.reportPaths=fast-api-dev/coverage/lcov.info
            -Dsonar.qualitygate.wait=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ══════════════════════════════════════════
  # JOB 2: Pruebas de carga con K6
  # Solo corre si el JOB 1 paso sin errores
  # ══════════════════════════════════════════
  k6-test:
    name: "K6 Performance Test"
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - uses: actions/checkout@v4

      - name: "Build imagen Docker para pruebas"
        run: |
          echo "================================"
          echo "CONSTRUYENDO IMAGEN PARA K6"
          echo "================================"
          docker build -t fast-api-test ./fast-api-dev
          echo "Imagen construida"

      - name: "Levantar contenedor para pruebas"
        run: |
          docker run -d \
            --name fast-api-test \
            -p 3000:3000 \
            fast-api-test
          echo "Esperando que arranque..."
          sleep 8
          echo ""
          echo "Contenedor corriendo:"
          docker ps --filter "name=fast-api-test" \
            --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          echo ""
          echo "Logs del contenedor:"
          docker logs fast-api-test --tail 10

      - name: "Correr K6 contra el contenedor"
        run: |
          echo "================================"
          echo "INSTALANDO Y CORRIENDO K6"
          echo "================================"
          curl -L https://github.com/grafana/k6/releases/download/v0.49.0/k6-v0.49.0-linux-amd64.tar.gz | tar -xz
          sudo mv k6-v0.49.0-linux-amd64/k6 /usr/local/bin/
          k6 run --env BASE_URL=http://localhost:3000 \
            fast-api-dev/load_test.js \
            || k6 run --env BASE_URL=http://localhost:3000 \
            load_test.js
          echo "================================"
          echo "K6 TERMINO"
          echo "================================"

      - name: "Limpiar contenedor de prueba"
        if: always()
        run: |
          docker stop fast-api-test || true
          docker rm fast-api-test   || true
          echo "Contenedor de prueba eliminado"

  # ══════════════════════════════════════════
  # JOB 3: Construir y subir imagen a GHCR
  # Solo corre si K6 paso sin errores
  # ══════════════════════════════════════════
  build-and-push:
    name: "Build & Push Docker Image"
    runs-on: ubuntu-latest
    needs: k6-test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: "Login en GHCR"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Build y Push"
        uses: docker/build-push-action@v5
        with:
          context: fast-api-dev
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      - name: "Confirmar imagen subida"
        run: |
          echo "================================"
          echo "IMAGEN SUBIDA A GHCR"
          echo "   ghcr.io/${{ github.repository }}:latest"
          echo "   Commit : ${{ github.sha }}"
          echo "   Fecha  : $(date)"
          echo "================================"

  # ══════════════════════════════════════════
  # JOB 4: Deploy Blue-Green en produccion
  # Solo corre si la imagen se subio bien
  # ORDEN CORRECTO para cero 502:
  #   1. Sube el nuevo contenedor
  #   2. Health check del nuevo
  #   3. switch_nginx.sh  <-- PRIMERO cambia nginx (el viejo sigue vivo)
  #   4. Baja el viejo    <-- DESPUES de que nginx ya cambio
  # ══════════════════════════════════════════
  deploy:
    name: "Deploy Blue-Green"
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      # ─────────────────────────────────────
      # PASO 1: Sube el nuevo contenedor en vpn-1
      # El viejo sigue corriendo mientras tanto
      # ─────────────────────────────────────
      - name: "Deploy en vpn-1"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 120s
          script: |
            echo "================================"
            echo "DEPLOY BLUE-GREEN EN vpn-1"
            echo "================================"

            IMAGE="ghcr.io/pugaoficial22-crypto/example-node:latest"

            # Autenticarse en GHCR para poder jalar la imagen
            docker login ghcr.io \
              -u pugaoficial22-crypto \
              -p ${{ secrets.GITHUB_TOKEN }}

            # Detectar cual contenedor esta corriendo ahorita
            CURRENT=$(docker ps --format '{{.Names}}' \
              | grep "fast-api-dev" \
              | sed 's/fast-api-dev-//' \
              | head -1)

            # Si no hay ninguno corriendo empezamos asumiendo green
            # para que NEXT sea blue y arranquemos con blue
            [ -z "$CURRENT" ] && CURRENT="green"

            # El siguiente es el opuesto al actual
            if [ "$CURRENT" = "blue" ]; then
              NEXT="green"; NEXT_PORT=8081; CURRENT_PORT=8080
            else
              NEXT="blue";  NEXT_PORT=8080; CURRENT_PORT=8081
            fi

            echo ""
            echo "Como esta ANTES del deploy:"
            docker ps --filter "name=fast-api-dev" \
              --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "Activo ahorita : $CURRENT (puerto $CURRENT_PORT)"
            echo "Vamos a subir  : $NEXT    (puerto $NEXT_PORT)"

            # Jalar la imagen nueva desde GHCR
            echo ""
            echo "Jalando imagen nueva..."
            docker pull $IMAGE

            echo ""
            echo "Imagen bajada:"
            docker images ghcr.io/pugaoficial22-crypto/example-node \
              --format "table {{.Tag}}\t{{.CreatedAt}}\t{{.Size}}"

            # Limpiar el slot destino por si quedó algo antes
            echo ""
            echo "Limpiando slot $NEXT por si existia..."
            docker stop fast-api-dev-$NEXT 2>/dev/null \
              && echo "Detenido" || echo "No corria"
            docker rm fast-api-dev-$NEXT 2>/dev/null \
              && echo "Eliminado" || echo "No existia"

            # Levantar el NUEVO contenedor
            # El viejo sigue corriendo y sirviendo trafico
            echo ""
            echo "Levantando fast-api-dev-$NEXT en puerto $NEXT_PORT..."
            docker run -d \
              --name fast-api-dev-$NEXT \
              -p $NEXT_PORT:3000 \
              --restart always \
              $IMAGE

            # Esperar que la app arranque adentro del contenedor
            echo "Esperando 8 segundos que arranque..."
            sleep 8

            echo ""
            echo "Como quedo despues de levantar (deben estar LOS DOS):"
            docker ps --filter "name=fast-api-dev" \
              --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "Logs del contenedor nuevo:"
            echo "--------------------------------------------------"
            docker logs fast-api-dev-$NEXT --tail 15
            echo "--------------------------------------------------"

            # Health check del NUEVO contenedor
            # Si no responde 200, rollback y salir
            echo ""
            echo "Health check en localhost:$NEXT_PORT/health..."
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:$NEXT_PORT/health || echo "000")

            if [ "$HTTP" != "200" ]; then
              echo "No respondio (HTTP $HTTP) - rollback..."
              docker stop fast-api-dev-$NEXT
              docker rm fast-api-dev-$NEXT
              echo "El viejo sigue activo: fast-api-dev-$CURRENT"
              exit 1
            fi
            echo "Health check OK (HTTP $HTTP)"

            # Guardar cual es el nuevo color activo
            # switch_nginx.sh lee este archivo para saber a donde apuntar
            echo "$NEXT" > /home/g2023171060/active_env
            echo "active_env guardado: $NEXT"

            echo ""
            echo "================================"
            echo "Nuevo contenedor listo en vpn-1"
            echo "Viejo sigue corriendo: $CURRENT"
            echo "Nginx cambia en el siguiente paso"
            echo "================================"

      # ─────────────────────────────────────
      # PASO 2: Cambia nginx AL NUEVO
      # El viejo sigue vivo aqui — nginx tiene
      # ambos disponibles durante el switch
      # Una vez que nginx apunta al nuevo, ya
      # no llega trafico al viejo
      # ─────────────────────────────────────
      - name: "Switch trafico en nginx-externa"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NGINX_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          script: |
            ~/switch_nginx.sh

      # ─────────────────────────────────────
      # PASO 3: Baja el viejo en vpn-1
      # Nginx YA apunta al nuevo desde el paso anterior
      # El viejo ya no recibe trafico — es seguro bajarlo
      # ─────────────────────────────────────
      - name: "Bajar contenedor viejo en vpn-1"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          script: |
            echo "================================"
            echo "BAJANDO CONTENEDOR VIEJO"
            echo "================================"

            # Leer cual es el nuevo (el que subimos en el paso 1)
            NEXT=$(cat /home/g2023171060/active_env)

            # El viejo es el opuesto
            if [ "$NEXT" = "blue" ]; then
              OLD="green"
            else
              OLD="blue"
            fi

            echo "Nuevo activo : $NEXT"
            echo "Voy a bajar  : $OLD"

            # Bajar el viejo — nginx ya no le manda trafico
            echo ""
            echo "Bajando fast-api-dev-$OLD..."
            docker stop fast-api-dev-$OLD \
              && echo "  Detenido" || echo "  No corria"
            docker rm fast-api-dev-$OLD \
              && echo "  Eliminado" || echo "  No existia"

            # Limpiar imagenes que ya no usa nadie
            echo ""
            echo "Limpiando imagenes viejas..."
            docker image prune -f

            # Estado final — solo debe quedar UNO
            echo ""
            echo "Como quedo AL FINAL (debe haber solo UNO):"
            docker ps --filter "name=fast-api-dev" \
              --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "================================"
            echo "DEPLOY COMPLETO - CERO 502"
            echo "  Activo : fast-api-dev-$NEXT"
            echo "  Bajo   : fast-api-dev-$OLD"
            echo "================================"